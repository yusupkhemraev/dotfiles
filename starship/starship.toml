[custom.docker]
description = "docker client version (+context if not default)"
detect_files = [
  'Dockerfile',
  'compose.yml', 'compose.yaml',
  'docker-compose.yml', 'docker-compose.yaml',
  'docker-compose.base.yml',
  'docker-compose.ci.yml',
  'docker-compose.local.yml',
  'docker-compose.prod.yml',
]
# when = "command -v docker >/dev/null 2>&1"
# command = """
# ver=$(docker --version 2>/dev/null | awk '{gsub(/,/, "", $3); print $3}')
# ctx=$(docker context show 2>/dev/null)
# if [ -n "$ctx" ] && [ "$ctx" != "default" ] && [ "$ctx" != "desktop-linux" ]; then
#   printf "%s@%s" "$ver" "$ctx"
# else
#   printf "%s" "$ver"
# fi
# """
style = 'fg:#06969A'
format = '[≤░κρ $output ]($style)'

[custom.compose]
description = "docker compose version"
detect_files = [
  'compose.yml', 'compose.yaml',
  'docker-compose.yml', 'docker-compose.yaml',
  'docker-compose.base.yml',
  'docker-compose.ci.yml',
  'docker-compose.local.yml',
  'docker-compose.prod.yml',
]
# when = "command -v docker >/dev/null 2>&1"
# command = "docker compose version --short 2>/dev/null || docker-compose version --short 2>/dev/null"
style = 'fg:#06969A'
# format = '[≤▒ΒΡ $output ]($style)'
# format = '[≤░κρ ]($style)'


[jobs]
disabled = true
symbol = 'ΎΑΥ '
style = 'red'
# Disabled: atuin spawns a background job each prompt to record history async,
# which made the jobs indicator (cog) show up permanently.
number_threshold = 1
format = '[$symbol]($style)'

[cmd_duration]
min_time = 500
style = 'fg:gray'
format = '[$duration]($style)'

