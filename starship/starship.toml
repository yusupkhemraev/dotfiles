# format = '[¾░í¿ ]($style)'


[jobs]
symbol = '´Çô '
style = 'red'
number_threshold = 1
format = '[$symbol]($style)'

[cmd_duration]
min_time = 500
style = 'fg:gray'
format = '[$duration]($style)'

