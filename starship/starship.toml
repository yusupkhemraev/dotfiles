format = """
$directory\
${custom.home}\
$git_branch\
$git_status\
$fill\
$python\
$lua\
$nodejs\
$golang\
$haskell\
$rust\
$ruby\
$aws\
${custom.docker}${custom.compose}\
$docker_context\
$jobs\
$line_break\
$character"""


add_newline = false
# palette = "nord"
palette = "catppuccin_mocha"

[directory]
style = 'bold fg:dark_blue'
format = '[$path ]($style)'
truncation_length = 3
truncation_symbol = 'έΑο/'
truncate_to_repo = false
read_only = " ≤░Ν╛"

[directory.substitutions]
'Documents' = '≤░Ιβ'
'Downloads' = 'ΎΑβ '
'Music' = 'ΎΑΒ '
'Pictures' = 'ΎΑ╛ '

[custom.home]
detect_folders = ['.config']
when = 'test "$PWD" = "$HOME"'
command = 'printf "ΎΑΧ"'
style = 'fg:dark_blue'
format = '[$output ]($style)'

[git_branch]
style = 'fg:green'
symbol = 'ΎΡα '
format = '[on](white) [$symbol$branch ]($style)'

[git_status]
style = 'fg:green'
format = '([$all_status$ahead_behind]($style) )'

[fill]
symbol = ''

[python]
style = 'teal'
symbol = 'ΌΙ╡ '
pyenv_version_name = false
format = '[$symbol($version )(\($virtualenv\) )]($style)'
detect_files = ['.python-version', 'Pipfile', '__init__.py', 'pyproject.toml', 'requirements.txt', 'setup.py', 'tox.ini', 'uv.lock']
python_binary = ['python3', 'python']

#[custom.claude]
#description = "Claude Code rate limits (5h / 7d), ╨╖╨░╤Ζ╨▓╨░╤Θ╨╡╨╜╨╜╤Μ╨╡ ╨╕╨╖ statusline CC"
#when = 'test -s "${XDG_CACHE_HOME:-$HOME/.cache}/claude-usage"'
#command = 'cat "${XDG_CACHE_HOME:-$HOME/.cache}/claude-usage"'
#style = 'teal'
#format = ' [≤░πΣ $output]($style)'
#format = '[┬╖ ≤░γσ $output ]($style)'

[custom.venv]
description = "venv present"
detect_folders = ['.venv', 'venv']
command = 'printf ""'
style = 'teal'
format = '[≤░Νι ]($style)'

[custom.uv]
description = "uv project"
detect_files = ['uv.lock']
command = 'printf "uv"'
style = 'teal'
format = '[$output ]($style)'

[lua]
format = '[$symbol($version )]($style)'
symbol = 'Όαι '

[nodejs]
style = 'blue'
# symbol = 'Όεα '
symbol = 'Όεα '

[golang]
style = 'blue'
# symbol = 'Όαπ '
symbol = "Όαπ "

[haskell]
style = 'blue'
symbol = "Όζ╖ "

[rust]
style = 'orange'
symbol = "≤▒αΩ "

[ruby]
style = 'blue'
symbol = "ΌηΣ "

[package]
# symbol = '≤░ΠΩ '
symbol = '≤░ΠΩ '

[aws]
symbol = 'ΎΚ░ '
style = 'yellow'
format = '[$symbol($profile )(\[$duration\] )]($style)'

