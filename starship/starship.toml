format = """
$directory\
${custom.home}\
$git_branch\
$git_status\
$fill\
$python\
$lua\
$nodejs\
$golang\
$haskell\
$rust\
$ruby\
$aws\
${custom.docker}${custom.compose}\
$docker_context\
$jobs\
$line_break\
$character"""


add_newline = false
# palette = "nord"
palette = "catppuccin_mocha"

[directory]
style = 'bold fg:dark_blue'
format = '[$path ]($style)'
truncation_length = 3
truncation_symbol = 'ÔÇĞ/'
truncate_to_repo = false
read_only = " ¾░î¥"

[directory.substitutions]
'Documents' = '¾░êÖ'
'Downloads' = '´ÇÖ '
'Music' = '´Çü '
'Pictures' = '´Ç¥ '

[custom.home]
detect_folders = ['.config']
when = 'test "$PWD" = "$HOME"'
command = 'printf "´Çò"'
style = 'fg:dark_blue'
format = '[$output ]($style)'

[git_branch]
style = 'fg:green'
symbol = '´Éİ '
format = '[on](white) [$symbol$branch ]($style)'

[git_status]
style = 'fg:green'
format = '([$all_status$ahead_behind]($style) )'

[fill]
symbol = ''

[python]
style = 'teal'
symbol = '¯êÁ '
pyenv_version_name = false
format = '[$symbol($version )(\($virtualenv\) )]($style)'
detect_files = ['.python-version', 'Pipfile', '__init__.py', 'pyproject.toml', 'requirements.txt', 'setup.py', 'tox.ini', 'uv.lock']
python_binary = ['python3', 'python']

[custom.venv]
description = "venv present"
detect_folders = ['.venv', 'venv']
command = 'printf ""'
style = 'teal'
format = '[¾░îá ]($style)'

[custom.uv]
description = "uv project"
detect_files = ['uv.lock']
command = 'printf "uv"'
style = 'teal'
format = '[$output ]($style)'

[lua]
format = '[$symbol($version )]($style)'
symbol = '¯İá '

[nodejs]
style = 'blue'
# symbol = '¯£İ '
symbol = '¯£İ '

[golang]
style = 'blue'
# symbol = '¯İğ '
symbol = "¯İğ "

[haskell]
style = 'blue'
symbol = "¯ØÀ "

[rust]
style = 'orange'
symbol = "¾▒İù "

[ruby]
style = 'blue'
symbol = "¯Şæ "

[package]
# symbol = '¾░Åù '
symbol = '¾░Åù '

[aws]
symbol = '´ë░ '
style = 'yellow'
format = '[$symbol($profile )(\[$duration\] )]($style)'

